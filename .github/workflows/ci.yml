name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "*"
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          # Ignore example scripts and integration tests that require local DaVinci Resolve or MCP server
          pytest --ignore=examples/markers/test_marker_frames.py \
                 --ignore=tests/unit/test_system_handlers.py
